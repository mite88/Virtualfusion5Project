spring:

  application:
    name: products-service

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test-db
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create

  h2:
    console:
      enabled: true
      path: /h2-consoles

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # OpenAPI 데이터(JSON 포맷)를 제공할 URL 경로를 설정

#  group-configs:
#    - group: "1. 사용자 API (v1)"       # Swagger UI 드롭다운에 표시될 그룹 이름
#      paths-to-match: /api/v1/** # 이 URL 경로로 시작하는 API들만 이 그룹에 포함
#      packages-to-scan: com.app.user   # (선택) 특정 패키지 안의 컨트롤러만 묶고 싶을 때 사용

#    - group: "2. 관리자 API"
#      paths-to-match: /admin/** # /admin/ 으로 시작하는 API들만 모아서 보여줌


  swagger-ui:
    enabled: true                     # Swagger UI 화면 기능을 활성화
    path: /swagger-ui.html            # Swagger UI 접속 브라우저 경로를 설정
    tags-sorter: alpha                # 태그(컨트롤러)를 알파벳 순서로 정렬
    operations-sorter: method         # API 목록을 HTTP 메서드(GET, POST 등) 순으로 정렬
    doc-expansion: none               # 화면 접속 시 API 목록을 모두 접기(깔끔한 첫 화면). (none: 닫힘, list: 펼침, full: 전체 펼침)
    disable-swagger-default-url: true # 상단 검색창에 뜨는 기본 더미 주소(petstore)를 숨김
    display-request-duration: true    # API 테스트 시 응답에 걸린 시간을 화면에 표시
    persistAuthorization: true  # 페이지 새로고침 후에도 Authorization 헤더 유지 여부

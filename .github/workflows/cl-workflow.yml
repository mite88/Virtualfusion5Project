on:
  push:
    branches: [dev, main]
    paths:
      - 'app_ci/**'  # 이 폴더 안의 내용이 바뀔 때만 동작!
  pull_request:
    branches: [dev, main]
    paths:
      - 'app_ci/**'

jobs:
  code-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_ci # 💡 핵심: 빌드할 폴더 지정
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 테스트 실행
        run: ./gradlew test --no-daemon




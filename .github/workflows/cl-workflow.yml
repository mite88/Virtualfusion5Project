on:
  push:
    branches: [dev, main]
    paths:
      - 'app_ci/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'app_ci/**'

jobs:
  code-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_ci
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      
      # 💡 핵심: 실행 전 권한 부여 (chmod +x)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: 테스트 실행
        run: ./gradlew test --no-daemon
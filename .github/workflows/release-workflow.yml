name: Build and release docker image

#docker build .
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io

# tagging -> bulid -> release
jobs:
  tagging:
    name : 태깅
    runs-on: ubuntu-latest
    permissions:
      contents: write # 💡 필수: 태그 생성 권한
    outputs:
      tag_name: ${{ steps.tag_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6 # 준비스텝
      - name: 버저닝 및 태깅
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 자동으로 들어가짐 ㅇㅁㅇ

  build-image:
    name: 도커 이미지 빌드
    runs-on: ubuntu-latest
    needs: tagging

    steps:
      - name : 리포지터리로 체크아웃
        uses: actions/checkout@v6

      # Docker Image
      # jdk -> gradle -> jar
      - name : jdk 셋팅
        uses: actions/setup-java@v5
        with:
         distribution: 'temurin'
         java-version: '25'

      - name: gradlew 권한셋팅
        run: chmod +x ./gradlew

      - name : Gradle 빌드
        run : ./gradlew build

      # bulid/libs/xxx.jar
      - name : Docker Registry 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{env.REGISTRY}}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name : mata 태그 추출
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{env.REGISTRY}}/${{github.actor}}/${{github.repository}}
          tags: |
            type=sha
            type=raw,value=${{needs.tagging.outputs.tag_name}}
            type=raw,value=latest

      - name: 빌드 및 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}

            
            
            
            
            

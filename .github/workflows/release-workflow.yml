name: Build and release docker image

on:
  push:
    branches: [dev, main]
    paths:
      - '2026_rapa_018-main/**' # 소스 코드가 있는 폴더 변경 시 동작
  pull_request:
    branches: [dev, main]
    paths:
      - '2026_rapa_018-main/**'

env:
  REGISTRY: ghcr.io
  SOURCE_DIR: 2026_rapa_018-main # 소스 코드 폴더명

jobs:
  code-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: 테스트 실행
        run: ./gradlew test --no-daemon

  tagging:
    name: 태깅
    needs: code-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
      - name: 버저닝 및 태깅
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-image:
    name: 도커 이미지 빌드
    runs-on: ubuntu-latest
    needs: tagging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: JDK 셋팅
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Gradle 빌드
        run: |
          cd ${{ env.SOURCE_DIR }}
          chmod +x gradlew
          ./gradlew build

      - name: Docker Registry 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta 태그 추출
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=${{ needs.tagging.outputs.tag_name }}
            type=raw,value=latest

      - name: 빌드 및 푸시
        uses: docker/build-push-action@v7
        with:
          context: .           # Dockerfile이 루트에 있으므로 루트를 컨텍스트로 지정
          file: ./Dockerfile   # 루트의 Dockerfile 사용
          push: true
          tags: ${{ steps.meta.outputs.tags }}
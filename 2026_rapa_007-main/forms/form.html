<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <form method="post" action="/users/login">

    <h2>
      로그인
    </h2>

    <label for="username">
      아이디 : 
    </label>
    <input id="username" type="text" name="username">
    <br>

    <label for="password">
      비밀번호 :
    </label>
    <input id="password" type="password" name="password">
    <br>

    
    <label for="email">
      이메일 :
    </label> 
    <input id="email" type="text" name="email">
    <br>

    <button>
      제출
    </button>

  </form>

  <hr>

  <form>

    <h2>
      게시글 작성
    </h2>

    <label>
      <textarea name="content" id=""></textarea>
    </label>

    <button>
      작성
    </button>

  </form>

  <form action="">

    <label for="size">구매할 상품을 선택하세요.</label>

    <br>

    <select name="sizes" id="size">
      <optgroup label="Electronic">
        <option value="laptop">노트북</option>
        <option value="smartPhone">스마트폰</option>
        <option value="headPhone">헤드폰</option>
      </optgroup>  
      <optgroup label="Clothes">
        <option value="tshirt">티샤스</option>
        <option value="jean">청바지</option>
        <option value="jacket">재킷</option>
      </optgroup>  
      <optgroup label="Snack">
        <option value="chips">감자칩</option>
        <option value="chocolate">쪼꼬렛</option>
      </optgroup>  
    </select>


    <input type="text" list="car-brands" placeholder="자동차 브랜드 입력">
    <datalist id="car-brands">
      <option value="Hyundai">
      <option value="Kia">
      <option value="BMW">
      <option value="Tesla">
    </datalist>

  </form>



</body>
</html>

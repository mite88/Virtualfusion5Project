<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    body {
      padding: 10rem;
    }

    .container {

      display: grid;

      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 200px;

      gap: 10px;

      grid-template-areas: 
        ' tea1 tea1 teat1 '
        ' tree tree tea2 '
        ' tree tree tea2 '
        ' tea3 tea3 tea4 '
        ' tea5 tea5 tea4 '
      ;
    
    }

    .img {

      width: 100%;
      height: 100%;
      object-fit: cover;

    }

    .tree {
      grid-area: tree;
    }

    .tea1 {
      grid-area: tea1;
    }
    
    .tea2 {
      grid-area: tea2;
    }
    
    .tea3 {
      grid-area: tea3;
    }

    .tea4 {
      grid-area: tea4;
    }

    .tea5 {
      grid-area: tea5;
    }


  </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVER</title>
</head>
<body>
  <div>
    <!-- 
    h1-6 
    # h1
    ## h2
    ### h3
    #### h4
    -->
    <h1>제목1</h1>
    <h2>제목2</h2>
    <h3>제목3</h3>
    <h4>제목4</h4>
    <h5>제목5</h5>
    <h6>제목6</h6>
  </div>

  <div>
    <!-- p -->
    <p> p태그, 하나의 블록으로 처리됩니다. </p>
  </div>

  <div>
    <hr> 
    <!-- ---  -->
    <p>hr태그는 수평선을 삽입해줍니다.</p>
  </div>

  <div>

    <p>
      문단 안에
      <p>
        문단도 쓸 수 있습니다. 이때, 줄바꿈이 발생합니다.
      </p>
    </p>

  </div>

  <div>

    <p>
      strong 태그는 중요한 텍스트를 
      <strong>강조</strong>해 <strong>굵은 글씨</strong>로
      표시됩니다.
    </p>

    
    <p>
      b 태그는 중요한 텍스트를 
      <b>강조</b>해 <b>굵은 글씨</b>로
      표시됩니다.
    </p>

    <p>
      i태그는 텍스트를 <i>Italic</i>으로 표시합니다. Italic
    </p>

    
    <p>
      em태그는 텍스트를 <em>Italic</em>으로 표시합니다. Italic
    </p>

  </div>

</body>
</html>

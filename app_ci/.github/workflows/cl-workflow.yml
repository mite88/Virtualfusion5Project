name: cl-workflow.yml
#event 핸들러
on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  code-test:
    name: 코드 테스트
    runs-on: ubuntu-latest
    steps:
      # name과 uses를 한 블록으로 묶어야 합니다.
      - name: 브랜치 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4 # v5보다는 v4가 더 일반적입니다.
        with:
          distribution: 'temurin' # Oracle보다는 temurin/zulu를 권장합니다.
          java-version: '25'      # 25버전은 아직 정식 지원이 불안정할 수 있어 17 권장

      - name: gradlew 권한 설정
        run: chmod +x ./gradlew

      - name: 테스트 실행
        # 권한을 주고 바로 이어서 테스트를 실행하는 방식입니다.
        run: chmod +x ./gradlew && ./gradlew test --no-daemon
        working-directory: 2026_rapa_018-main # 본인의 프로젝트 폴더명 유지


